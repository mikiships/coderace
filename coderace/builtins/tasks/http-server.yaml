name: http-server
description: |
  Build a minimal HTTP/1.1 server using only the Python standard library.

  Create a file called `http_server.py` with:

  class SimpleHTTPServer:
      def __init__(self, host: str = "127.0.0.1", port: int = 0, root_dir: str = "."):
          """Initialize the server. port=0 means pick an available port."""

      def start(self) -> None:
          """Start serving in a background thread."""

      def stop(self) -> None:
          """Stop the server and clean up."""

      @property
      def port(self) -> int:
          """Return the actual port the server is listening on."""

  Requirements:
  - Use only `socket` and standard library modules (no http.server)
  - Handle GET requests for static files under root_dir
  - Return proper HTTP/1.1 responses with status line and headers:
    - 200 OK with Content-Type and Content-Length for existing files
    - 404 Not Found for missing files
    - 405 Method Not Allowed for non-GET methods
  - Content-Type mapping (by extension):
    - .html -> text/html
    - .css -> text/css
    - .js -> application/javascript
    - .json -> application/json
    - .txt -> text/plain
    - default -> application/octet-stream
  - Serve index.html when a directory path is requested
  - Must not allow path traversal (e.g., /../../../etc/passwd must return 404)

  Create a file called `test_http_server.py` with tests covering:
  - GET an existing file returns 200 with correct Content-Type and body
  - GET a missing file returns 404
  - Correct Content-Type for .html, .txt, .json, .css, .js files
  - Directory request serves index.html
  - Path traversal attempt returns 403 or 404
  - Server start/stop lifecycle works

  Tests should use urllib.request or socket to make HTTP requests to the server.
  Use a temporary directory as root_dir for test files.

  Do NOT modify any other files.
repo: .
test_command: python3 -m pytest test_http_server.py -x -q
verify_command: python3 -m pytest verify_http_server.py -x -q
verify_files:
  verify_http_server.py: |
    from concurrent.futures import ThreadPoolExecutor
    from pathlib import Path
    import urllib.error
    import urllib.request

    import pytest

    from http_server import SimpleHTTPServer


    @pytest.fixture
    def running_server(tmp_path: Path):
        files = {
            "index.html": "<h1>Hello</h1>",
            "style.css": "body{color:black;}",
            "app.js": "console.log('ok')",
            "data.json": '{"ok": true}',
            "data.txt": "plain-text",
            "blob.bin": "\\x00\\x01\\x02",
        }
        for name, content in files.items():
            path = tmp_path / name
            if isinstance(content, str):
                path.write_text(content)
            else:
                path.write_bytes(content)

        server = SimpleHTTPServer(host="127.0.0.1", port=0, root_dir=str(tmp_path))
        server.start()
        try:
            yield server
        finally:
            server.stop()


    def _fetch(url: str, method: str = "GET") -> tuple[int, bytes, dict[str, str]]:
        req = urllib.request.Request(url, method=method)
        with urllib.request.urlopen(req, timeout=2.0) as response:
            status = response.getcode()
            body = response.read()
            headers = {k.lower(): v for k, v in response.headers.items()}
        return status, body, headers


    def test_success_response_contains_required_headers(running_server: SimpleHTTPServer) -> None:
        url = f"http://127.0.0.1:{running_server.port}/data.txt"
        status, body, headers = _fetch(url)
        assert status == 200
        assert headers["content-type"] == "text/plain"
        assert int(headers["content-length"]) == len(body)
        assert body == b"plain-text"


    def test_error_responses_for_missing_and_wrong_method(running_server: SimpleHTTPServer) -> None:
        base = f"http://127.0.0.1:{running_server.port}"

        with pytest.raises(urllib.error.HTTPError) as missing:
            _fetch(f"{base}/missing.txt")
        assert missing.value.code == 404

        with pytest.raises(urllib.error.HTTPError) as wrong_method:
            _fetch(f"{base}/data.txt", method="POST")
        assert wrong_method.value.code == 405


    def test_content_type_mapping(running_server: SimpleHTTPServer) -> None:
        base = f"http://127.0.0.1:{running_server.port}"
        expected = {
            "/index.html": "text/html",
            "/style.css": "text/css",
            "/app.js": "application/javascript",
            "/data.json": "application/json",
            "/data.txt": "text/plain",
            "/blob.bin": "application/octet-stream",
        }
        for path, content_type in expected.items():
            status, _body, headers = _fetch(f"{base}{path}")
            assert status == 200
            assert headers["content-type"] == content_type


    def test_handles_concurrent_requests(running_server: SimpleHTTPServer) -> None:
        url = f"http://127.0.0.1:{running_server.port}/index.html"

        def fetch_once() -> tuple[int, bytes]:
            status, body, _headers = _fetch(url)
            return status, body

        with ThreadPoolExecutor(max_workers=12) as executor:
            results = list(executor.map(lambda _i: fetch_once(), range(48)))

        for status, body in results:
            assert status == 200
            assert body == b"<h1>Hello</h1>"
lint_command: ruff check http_server.py
timeout: 600
agents:
  - claude
  - codex
  - gemini
  - aider
  - opencode
scoring:
  tests: 25
  verify: 30
  exit: 20
  lint: 15
  time: 5
  lines: 5
