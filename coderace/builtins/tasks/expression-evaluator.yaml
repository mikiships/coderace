name: expression-evaluator
difficulty: hard
description: |
  Implement a math expression parser/evaluator in `expression_evaluator.py`.

  Required public API:

  - `evaluate(expression: str, variables: dict[str, float] | None = None) -> float`

  Requirements:
  - Operators: `+`, `-`, `*`, `/`, `**`
  - Parentheses
  - Unary minus
  - Variables provided by `variables` mapping
  - Functions: `sin`, `cos`, `sqrt`, `abs`
  - Correct precedence and associativity (especially exponentiation)
  - Raise clear errors for division by zero and undefined variables

  Do not use Python `eval`/`exec`.

  Create your own test file `test_expression_evaluator.py` and ensure it passes.
  Do NOT modify files other than `expression_evaluator.py` and your test file.
repo: .
test_command: python3 -m pytest test_expression_evaluator.py -x -q
verify_command: python3 -m pytest verify_expression_evaluator.py -x -q
verify_files:
  verify_expression_evaluator.py: |
    import math

    import pytest

    from expression_evaluator import evaluate


    @pytest.mark.parametrize(
        ("expr", "expected"),
        [
            ("1+1", 2),
            ("2+3*4", 14),
            ("(2+3)*4", 20),
            ("10-3-2", 5),
            ("10-(3-2)", 9),
            ("8/4", 2),
            ("18/3/2", 3),
            ("2**3", 8),
            ("2**3**2", 512),
            ("(2**3)**2", 64),
            ("-5", -5),
            ("--5", 5),
            ("-3*2", -6),
            ("4*-2", -8),
            ("-(2+3)*4", -20),
            ("abs(-7)", 7),
            ("sqrt(9)", 3),
            ("sin(0)", 0),
            ("cos(0)", 1),
            ("sqrt(16)+abs(-3)", 7),
            ("(1+2+3+4+5)", 15),
            ("(((((5)))))", 5),
            ("0.1+0.2", 0.3),
            ("1.5*4", 6.0),
            ("7/2", 3.5),
            ("2 + 3 * (4 - 1)", 11),
            ("(2 + 3) * (4 - 1)", 15),
            ("2**-1", 0.5),
            ("4 + -3", 1),
            ("4 - -3", 7),
            ("abs(-2) + sqrt(25) - cos(0)", 6),
            ("sin(0)+cos(0)+abs(-1)+sqrt(4)", 4),
            ("3*(2+(4*(1+1)))", 30),
            ("(3+5)/(2+2)", 2),
            ("(2+3)*(4+5)/(3**2)", 5),
        ],
    )
    def test_expression_cases(expr: str, expected: float) -> None:
        result = evaluate(expr)
        assert result == pytest.approx(expected, rel=1e-9, abs=1e-9)


    @pytest.mark.parametrize(
        ("expr", "variables", "expected"),
        [
            ("x", {"x": 5}, 5),
            ("x+y", {"x": 2, "y": 3}, 5),
            ("x*y+z", {"x": 2, "y": 4, "z": 1}, 9),
            ("x**2 + y**2", {"x": 3, "y": 4}, 25),
            ("sqrt(x) + abs(y)", {"x": 9, "y": -2}, 5),
            ("sin(theta)", {"theta": 0}, 0),
            ("cos(theta)", {"theta": 0}, 1),
            ("a/b", {"a": 10, "b": 4}, 2.5),
            ("(a+b)*(c-d)", {"a": 1, "b": 2, "c": 10, "d": 3}, 21),
            ("-x + y", {"x": 5, "y": 7}, 2),
        ],
    )
    def test_variables(expr: str, variables: dict[str, float], expected: float) -> None:
        result = evaluate(expr, variables=variables)
        assert result == pytest.approx(expected, rel=1e-9, abs=1e-9)


    def test_deeply_nested_expression() -> None:
        expr = "1"
        for _ in range(40):
            expr = f"({expr}+1)"
        assert evaluate(expr) == 41


    def test_division_by_zero_error() -> None:
        with pytest.raises(Exception):
            evaluate("1/0")


    def test_undefined_variable_error() -> None:
        with pytest.raises(Exception):
            evaluate("x+1", variables={})


    def test_function_domain_error() -> None:
        with pytest.raises(Exception):
            evaluate("sqrt(-1)")
lint_command: ruff check expression_evaluator.py
timeout: 900
agents:
  - claude
  - codex
  - gemini
  - aider
  - opencode
scoring:
  tests: 25
  verify: 30
  exit: 20
  lint: 15
  time: 5
