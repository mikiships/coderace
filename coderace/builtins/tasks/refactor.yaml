  verify_refactor.py: |
    """Hidden verification tests for refactor task — quality checks + functional."""

    import ast
    import inspect
    import os
    import tempfile
    import time

    import pytest

    import data_store


    @pytest.fixture(autouse=True)
    def clean_state():
        data_store.data.clear()
        data_store._listeners.clear()
        data_store._log.clear()
        yield
        data_store.data.clear()
        data_store._listeners.clear()
        data_store._log.clear()


    # --- AST-based quality checks ---

    def _get_module_ast():
        source = inspect.getsource(data_store)
        return ast.parse(source)


    def test_type_hints_on_public_functions():
        """All public functions must have type annotations on parameters."""
        tree = _get_module_ast()
        public_funcs = [
            n for n in ast.walk(tree)
            if isinstance(n, ast.FunctionDef) and not n.name.startswith("_")
        ]
        assert len(public_funcs) >= 10, "Expected at least 10 public functions"
        for func in public_funcs:
            # Check that at least return annotation exists
            has_return = func.returns is not None
            # Check parameters have annotations (skip 'self')
            params = func.args.args
            annotated = sum(
                1 for arg in params
                if arg.annotation is not None and arg.arg != "self"
            )
            total = len([a for a in params if a.arg != "self"])
            if total > 0:
                assert annotated > 0, (
                    f"Function {func.name} has {total} params but no type hints"
                )


    def test_no_function_exceeds_25_lines():
        """No function body should exceed 25 lines."""
        tree = _get_module_ast()
        for node in ast.walk(tree):
            if isinstance(node, ast.FunctionDef):
                body_lines = node.end_lineno - node.lineno
                assert body_lines <= 25, (
                    f"Function {node.name} is {body_lines} lines "
                    f"(max 25)"
                )


    def test_no_bare_except():
        """No bare except clauses allowed."""
        source = inspect.getsource(data_store)
        tree = ast.parse(source)
        for node in ast.walk(tree):
            if isinstance(node, ast.ExceptHandler):
                # bare except has type=None
                assert node.type is not None, "Bare except found — use specific exceptions"


    # --- Public API preservation ---

    def test_public_api_preserved():
        """The module must still export the same public API."""
        required = [
            "Set", "Get", "Delete", "Exists", "Keys", "Clear", "Count",
            "add_listener", "remove_listener", "get_log", "clear_log",
            "save_to_file", "load_from_file", "data", "_listeners", "_log",
        ]
        for name in required:
            assert hasattr(data_store, name), f"Missing public API: {name}"


    # --- Functional tests beyond the original suite ---

    def test_overwrite_value():
        data_store.Set("k", 1)
        data_store.Set("k", 2)
        assert data_store.Get("k") == 2

    def test_delete_then_set():
        data_store.Set("k", 1)
        data_store.Delete("k")
        data_store.Set("k", 2)
        assert data_store.Get("k") == 2

    def test_keys_excludes_expired():
        data_store.Set("alive", 1, ttl=10)
        data_store.Set("dead", 2, ttl=0.05)
        time.sleep(0.08)
        keys = data_store.Keys()
        assert "alive" in keys
        assert "dead" not in keys

    def test_count_after_mixed_operations():
        data_store.Set("a", 1)
        data_store.Set("b", 2)
        data_store.Set("c", 3)
        data_store.Delete("b")
        assert data_store.Count() == 2

    def test_save_load_preserves_ttl_structure():
        data_store.Set("k", "v", ttl=3600)
        with tempfile.NamedTemporaryFile(suffix=".json", delete=False) as f:
            path = f.name
        try:
            data_store.save_to_file(path)
            data_store.Clear()
            data_store.load_from_file(path)
            entry = data_store.data["k"]
            assert "value" in entry
            assert "expire_at" in entry
            assert entry["value"] == "v"
        finally:
            os.unlink(path)

    def test_multiple_listeners():
        events1 = []
        events2 = []
        data_store.add_listener(lambda a, k, v: events1.append(a))
        data_store.add_listener(lambda a, k, v: events2.append(a))
        data_store.Set("x", 1)
        assert events1 == ["set"]
        assert events2 == ["set"]

    def test_log_records_timestamps():
        before = time.time()
        data_store.Set("k", "v")
        after = time.time()
        log = data_store.get_log()
        assert before <= log[0]["time"] <= after
