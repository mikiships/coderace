name: csv-analyzer
description: |
  Build a CLI tool that reads CSV data from stdin and outputs summary statistics.

  Create a file called `csv_analyzer.py` that:
  - Reads CSV data from stdin (using the csv module is allowed)
  - Outputs a summary report to stdout with the following information:
    - Row count (excluding header)
    - Column count
    - For each column:
      - Column name
      - Type: "numeric" if all non-empty values parse as int/float, else "text"
      - Non-empty count
      - For numeric columns: min, max, mean (rounded to 2 decimal places)
      - For text columns: number of unique values

  Output format (one section per column, separated by blank lines):

    Rows: <N>
    Columns: <M>

    Column: <name>
    Type: numeric
    Non-empty: <count>
    Min: <value>
    Max: <value>
    Mean: <value>

    Column: <name>
    Type: text
    Non-empty: <count>
    Unique: <count>

  The script should be runnable as: echo "csv data" | python csv_analyzer.py

  Create a file called `test_csv_analyzer.py` with tests covering:
  - Basic numeric CSV: verify row count, column types, min/max/mean
  - Mixed numeric and text columns
  - Empty values are skipped in statistics
  - Single column CSV
  - CSV with only headers (0 rows)
  - Mean is rounded to 2 decimal places

  Tests should run csv_analyzer.py as a subprocess with CSV input piped to stdin
  and verify the stdout output.

  Do NOT modify any other files.
repo: .
test_command: python3 -m pytest test_csv_analyzer.py -x -q
verify_command: python3 -m pytest verify_csv_analyzer.py -x -q
verify_files:
  verify_csv_analyzer.py: |
    import subprocess
    import sys


    def run_analyzer(csv_text: str) -> str:
      proc = subprocess.run(
          [sys.executable, "csv_analyzer.py"],
          input=csv_text,
          text=True,
          capture_output=True,
          check=False,
      )
      assert proc.returncode == 0, proc.stderr
      return proc.stdout


    def extract_section(output: str, column_name: str) -> dict[str, str]:
      lines = output.splitlines()
      start = lines.index(f"Column: {column_name}") + 1
      section: dict[str, str] = {}
      for line in lines[start:]:
          if not line.strip():
              break
          key, value = line.split(": ", 1)
          section[key] = value
      return section


    def test_header_only_csv_reports_zero_rows() -> None:
      output = run_analyzer("a,b,c\\n")
      assert "Rows: 0" in output
      assert "Columns: 3" in output
      for col in ("a", "b", "c"):
          section = extract_section(output, col)
          assert section["Non-empty"] == "0"


    def test_quoted_fields_with_commas_and_newlines() -> None:
      csv_text = (
          "name,notes\\n"
          '"alpha, inc","line1\\nline2"\\n'
          '"beta","x, y, z"\\n'
      )
      output = run_analyzer(csv_text)
      assert "Rows: 2" in output
      assert "Columns: 2" in output
      name = extract_section(output, "name")
      notes = extract_section(output, "notes")
      assert name["Type"] == "text"
      assert notes["Type"] == "text"
      assert name["Unique"] == "2"
      assert notes["Unique"] == "2"


    def test_large_dataset_numeric_summary() -> None:
      rows = ["id,value,group"]
      for i in range(1, 2001):
          rows.append(f"{i},{i},g{i % 10}")
      output = run_analyzer("\\n".join(rows) + "\\n")

      assert "Rows: 2000" in output
      assert "Columns: 3" in output

      value = extract_section(output, "value")
      assert value["Type"] == "numeric"
      assert value["Non-empty"] == "2000"
      assert float(value["Min"]) == 1.0
      assert float(value["Max"]) == 2000.0
      assert float(value["Mean"]) == 1000.5

      group = extract_section(output, "group")
      assert group["Type"] == "text"
      assert group["Unique"] == "10"
lint_command: ruff check csv_analyzer.py
timeout: 300
agents:
  - claude
  - codex
  - gemini
  - aider
  - opencode
scoring:
  tests: 25
  verify: 30
  exit: 20
  lint: 15
  time: 5
  lines: 5
